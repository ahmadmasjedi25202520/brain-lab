name: Run Python Hello World

on:
  workflow_dispatch:

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # یک نسخه مشخص را درخواست می‌کند

      - name: Run Python script
        run: python -c "print('Hello, World!')"
