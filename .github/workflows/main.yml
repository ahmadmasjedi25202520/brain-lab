name: Run Python Hello World

on:
  workflow_dispatch:    # این خط به شما اجازه می‌دهد کار را به صورت دستی اجرا کنید [citation:4][citation:8]

jobs:
  run-python-script:
    runs-on: ubuntu-latest   # محیط اجرایی (یک سرور لینوکسی موقت)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # 1. کدهای مخزن شما را می‌آورد

      - name: Setup Python
        uses: actions/setup-python@v5   # 2. پایتون را نصب می‌کند [citation:2][citation:5][citation:9]
        with:
          python-version: '3.12'

      - name: Run Python script
        run: python hello.py   # 3. فایل پایتون شما را اجرا می‌کند [citation:6][citation:9]
